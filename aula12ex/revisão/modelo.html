<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Exercício</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Revisão de Manipulação DOM</h1>
    </header>

    <section>
        <div>
            <form>
                <label for="iano">Qual ano você nasceu?</label>
                <input type="text" name="ano" id="iano" maxlength="4">

                <fieldset>
                    <legend>Sexo</legend>

                    <input type="radio" name="sexo" id="mas" checked>
                    <label for="mas">Masculino</label>

                    <input type="radio" name="sexo" id="fem">
                    <label for="fem">Feminino</label>

                </fieldset>
                <button type="button" id="btn">VERIFICAR</button>
            </form>
        </div>
        <div id=res>
            <p>Preencha os campos para verificar</p>
        </div>
    </section>

    <footer>
        <p>&copy; CursoemVideo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
