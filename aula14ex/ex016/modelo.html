<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Exercício</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>

    <section>
        <div>
            <form>
                <label for="iinicio">Início:</label>
                <input type="number" name="inicio" id="iinicio" min="0" max="5"> <br>

                <label for="ifim">Fim:</label>
                <input type="number" name="fim" id="ifim"> <br>

                <label for="ipasso">Passo:</label>
                <input type="number" name="passo" id="ipasso"> <br>

                <button type="button" id="botaoContar">Contar</button>
            </form>
        </div>
        <div id="resposta">
            Preparando contagem...
        </div>
    </section>

    <footer>
        <p>&copy; Jonathan C.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
