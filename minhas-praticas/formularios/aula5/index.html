<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Exemplo de Formulário</h1>

    <form action="cadastro.js" method="get">

        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sx" id="isxmas" checked>
            <label for="isxmas">Masculino</label> <br>

            <input type="radio" name="sx" id="isxfem">
            <label for="isxfem">Feminino</label>
        </fieldset>


        <fieldset>
            <legend>ESPORTES</legend>
            <input type="checkbox" name="esbas" id="iesbas" checked>
            <label for="iesbas">Basquete</label><br>
            <input type="checkbox" name="esfut" id="iesfut">
            <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esnat" id="iesnat">
            <label for="iesnat">Natação</label> <br>
            <input type="checkbox" name="esten" id="iesten">
            <label for="iesten">Natação</label>
        </fieldset>



        <div>
            <input type="submit" value="FINALIZAR">
            <input type="reset" value="RESETAR">
        </div>

    </form>

</body>

</html>
